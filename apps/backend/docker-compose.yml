services:
  backend:
    build: .
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      PORT: ${PORT:-3001}
      PASSWORD: ${PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      NOTES_REPO_PATH: /notes
      GIT_REMOTE_URL: ${GIT_REMOTE_URL:-}
      GIT_USER_NAME: ${GIT_USER_NAME:-clawzettel}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-clawzettel@claw-zettel}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_BASE_URL: ${GLM_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      GLM_MODEL: ${GLM_MODEL:-glm-z1-flash}
      CLAWZETTEL_MODE: ${CLAWZETTEL_MODE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${NOTES_REPO_PATH:-./notes}:/notes
      - ./data:/app/data
    restart: unless-stopped
