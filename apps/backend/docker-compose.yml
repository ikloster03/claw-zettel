services:
  backend:
    build: .
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      PORT: ${PORT:-3001}
      PASSWORD: ${PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      NOTES_REPO_PATH: /notes
      GIT_REMOTE_URL: ${GIT_REMOTE_URL:-}
      GIT_USER_NAME: ${GIT_USER_NAME:-clawzettel}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-clawzettel@claw-zettel}
      CLAWZETTEL_BASE_URL: ${CLAWZETTEL_BASE_URL:-http://host.docker.internal:4000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${NOTES_REPO_PATH:-./notes}:/notes
      - ./data:/app/data
    restart: unless-stopped
